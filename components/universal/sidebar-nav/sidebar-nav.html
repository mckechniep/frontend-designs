<!doctype html>
<html lang="en" data-theme="dark" data-profile="arctic-mono">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidebar Nav — Component Demo</title>
    <link id="profile-css" rel="stylesheet" href="../../../themes/arctic-mono/theme.css" />
    <link rel="stylesheet" href="../token-bridge.css" />
    <link rel="stylesheet" href="./sidebar-nav.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; }
      .demo-layout {
        display: flex;
        min-height: 100vh;
      }
      .demo-main {
        flex: 1;
        padding: var(--s-6);
        background: var(--bg);
        overflow-y: auto;
      }
      .demo-main h1 {
        font-family: var(--font);
        font-size: 1.6rem;
        font-weight: 700;
        margin: 0 0 var(--s-2);
      }
      .demo-main p {
        color: var(--muted);
        margin: 0 0 var(--s-5);
        max-width: 560px;
      }
      .demo-event-log {
        padding: var(--s-4);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface-2);
        font-family: var(--font-mono);
        font-size: 0.82rem;
        color: var(--muted);
        min-height: 120px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .profile-switcher {
        position: fixed;
        top: var(--s-4);
        right: var(--s-4);
        z-index: 200;
        display: flex;
        gap: var(--s-2);
        align-items: center;
        padding: var(--s-2) var(--s-3);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        font-family: var(--font-mono);
        font-size: 0.78rem;
      }
      .profile-switcher select {
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 6px;
        font-family: inherit;
        font-size: inherit;
      }
      .profile-switcher label {
        color: var(--muted);
      }
    </style>
  </head>

  <body>
    <!-- Profile switcher -->
    <div class="profile-switcher">
      <label for="ps">Profile:</label>
      <select id="ps">
        <option value="arctic-mono">Arctic Mono</option>
        <option value="cyberpunk-neon">Cyberpunk Neon</option>
        <option value="noire-editorial">Noire Editorial</option>
        <option value="corporate-blueprint">Corporate Blueprint</option>
        <option value="modern-saas">Modern SaaS</option>
        <option value="pastel-dreamscape">Pastel Dreamscape</option>
        <option value="retro-terminal">Retro Terminal</option>
        <option value="sunset-gradient">Sunset Gradient</option>
      </select>
      <select id="ts">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </div>

    <div class="demo-layout">

      <!-- Sidebar -->
      <aside class="sidebar" data-sidebar>

        <!-- Brand -->
        <div class="sidebar__brand">
          <span class="sidebar__brand-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </span>
          <span class="sidebar__brand-text">Dashboard</span>
          <button class="sidebar__toggle" data-sidebar-toggle aria-label="Collapse sidebar" title="Collapse sidebar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
        </div>

        <!-- Nav -->
        <nav class="sidebar__nav">

          <!-- Section: Main -->
          <div class="sidebar__section">
            <span class="sidebar__section-label">Main</span>

            <button class="sidebar__item sidebar__item--active">
              <span class="sidebar__item-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              </span>
              <span class="sidebar__item-label">Dashboard</span>
            </button>

            <button class="sidebar__item">
              <span class="sidebar__item-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              </span>
              <span class="sidebar__item-label">Analytics</span>
            </button>

            <button class="sidebar__item">
              <span class="sidebar__item-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
              </span>
              <span class="sidebar__item-label">Projects</span>
            </button>

            <button class="sidebar__item">
              <span class="sidebar__item-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
              </span>
              <span class="sidebar__item-label">Messages</span>
              <span class="sidebar__item-badge">3</span>
            </button>
          </div>

          <!-- Section: Management -->
          <div class="sidebar__section">
            <span class="sidebar__section-label">Management</span>

            <button class="sidebar__item">
              <span class="sidebar__item-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
              </span>
              <span class="sidebar__item-label">Team</span>
            </button>

            <!-- Settings with submenu -->
            <div data-sidebar-submenu>
              <button class="sidebar__item" aria-expanded="false">
                <span class="sidebar__item-icon" aria-hidden="true">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </span>
                <span class="sidebar__item-label">Settings</span>
                <span class="sidebar__submenu-toggle" aria-hidden="true">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </span>
              </button>
              <div class="sidebar__submenu">
                <button class="sidebar__item">
                  <span class="sidebar__item-label">General</span>
                </button>
                <button class="sidebar__item">
                  <span class="sidebar__item-label">Security</span>
                </button>
                <button class="sidebar__item">
                  <span class="sidebar__item-label">Billing</span>
                </button>
              </div>
            </div>
          </div>

        </nav>

        <!-- Footer -->
        <div class="sidebar__footer">
          <span class="sidebar__footer-avatar" aria-hidden="true">JD</span>
          <div class="sidebar__footer-info">
            <span class="sidebar__footer-name">Jane Doe</span>
            <span class="sidebar__footer-role">Administrator</span>
          </div>
        </div>

      </aside>

      <!-- Main content -->
      <main class="demo-main">
        <h1>Sidebar Nav</h1>
        <p>Collapsible sidebar navigation with sections, badges, submenus, and icon-only mode. Switch profiles above to preview themed variants.</p>

        <h2 style="font-family: var(--font); font-size: 0.9rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 var(--s-3);">Event Log</h2>
        <div class="demo-event-log" id="event-log">Waiting for interaction...</div>
      </main>

    </div>

    <script src="./sidebar-nav.js"></script>
    <script src="../../shared/preview-runtime.js" data-theme-root="../../../themes"></script>
    <script>

      /* ---- Event logging ---- */
      var log = document.getElementById("event-log");
      var sidebar = document.querySelector("[data-sidebar]");

      sidebar.addEventListener("sidebar:navigate", function (e) {
        log.textContent = "[sidebar:navigate] " + e.detail.label + "\n" + log.textContent;
      });

      sidebar.addEventListener("sidebar:toggle", function (e) {
        log.textContent = "[sidebar:toggle] collapsed=" + e.detail.collapsed + "\n" + log.textContent;
      });
    </script>
  </body>
</html>
