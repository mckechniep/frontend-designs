<!doctype html>
<html lang="en" data-theme="dark" data-profile="arctic-mono">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Command Palette — Component Demo</title>
    <link id="profile-css" rel="stylesheet" href="../../../themes/arctic-mono/theme.css" />
    <link rel="stylesheet" href="../token-bridge.css" />
    <link rel="stylesheet" href="./command-palette.css" />
    <style>
      .demo-page { padding: var(--s-7) 0; min-height: 100vh; }
      .demo-page .container { max-width: 900px; margin: 0 auto; padding: 0 var(--s-5); }
      .demo-header { margin-bottom: var(--s-7); }
      .demo-header h1 { font-family: var(--font); font-size: 1.6rem; font-weight: 700; margin: 0 0 var(--s-2); }
      .demo-header p { color: var(--muted); margin: 0; font-family: var(--font); line-height: 1.6; }
      .demo-section { margin-bottom: var(--s-7); }
      .demo-section h2 { font-family: var(--font); font-size: 1.1rem; font-weight: 600; margin: 0 0 var(--s-4); color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.82rem; }
      .demo-open-btn {
        display: inline-flex; align-items: center; gap: var(--s-2);
        padding: 10px 18px; border-radius: var(--radius); border: 1px solid var(--border);
        background: var(--glass-bg); color: var(--text); font-family: var(--font-ui);
        font-weight: 600; font-size: 0.9rem; cursor: pointer; line-height: 1;
        transition: border-color 0.15s ease, background 0.15s ease;
      }
      .demo-open-btn:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); background: color-mix(in srgb, var(--accent) 6%, var(--glass-bg)); }
      .demo-open-btn kbd {
        display: inline-block; padding: 2px 6px; border-radius: 4px;
        background: var(--surface-2); border: 1px solid var(--border);
        font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted);
      }
      .demo-output {
        margin-top: var(--s-4); padding: var(--s-4);
        border: 1px solid var(--border-subtle); border-radius: var(--radius);
        background: var(--surface-2); font-family: var(--font-mono); font-size: 0.84rem;
        color: var(--muted); min-height: 42px; line-height: 1.5;
      }
      .demo-output strong { color: var(--accent); font-weight: 600; }
      .profile-switcher { position: fixed; top: var(--s-4); right: var(--s-4); z-index: 200; display: flex; gap: var(--s-2); align-items: center; padding: var(--s-2) var(--s-3); border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-family: var(--font-mono); font-size: 0.78rem; }
      .profile-switcher select { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; font-family: inherit; font-size: inherit; }
      .profile-switcher label { color: var(--muted); }
    </style>
  </head>

  <body>
    <div class="profile-switcher">
      <label for="ps">Profile:</label>
      <select id="ps">
        <option value="arctic-mono">Arctic Mono</option>
        <option value="cyberpunk-neon">Cyberpunk Neon</option>
        <option value="noire-editorial">Noire Editorial</option>
        <option value="corporate-blueprint">Corporate Blueprint</option>
        <option value="modern-saas">Modern SaaS</option>
        <option value="pastel-dreamscape">Pastel Dreamscape</option>
        <option value="retro-terminal">Retro Terminal</option>
        <option value="sunset-gradient">Sunset Gradient</option>
      </select>
      <select id="ts">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </div>

    <!-- Command Palette markup -->
    <div class="cmd-palette__overlay"></div>
    <div class="cmd-palette__dialog" role="dialog" aria-label="Command palette">
      <div class="cmd-palette__search">
        <span class="cmd-palette__search-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="cmd-palette__input" type="text" placeholder="Type a command..." autocomplete="off" spellcheck="false" />
      </div>
      <div class="cmd-palette__results"></div>
    </div>

    <div class="demo-page">
      <div class="container">
        <div class="demo-header">
          <h1>Command Palette</h1>
          <p>A modal command palette with fuzzy filtering, keyboard navigation, and grouped results. Press <kbd style="display:inline-block;padding:2px 6px;border-radius:4px;background:var(--surface-2);border:1px solid var(--border);font-family:var(--font-mono);font-size:0.8rem;">Ctrl+K</kbd> / <kbd style="display:inline-block;padding:2px 6px;border-radius:4px;background:var(--surface-2);border:1px solid var(--border);font-family:var(--font-mono);font-size:0.8rem;">Cmd+K</kbd> to open. Switch profiles above to preview themed variants.</p>
        </div>

        <div class="demo-section">
          <h2>Open Palette</h2>
          <button class="demo-open-btn" id="open-btn">
            Open Command Palette
            <kbd>Ctrl+K</kbd>
          </button>
        </div>

        <div class="demo-section">
          <h2>Last Executed Command</h2>
          <div class="demo-output" id="output">No command executed yet.</div>
        </div>
      </div>
    </div>

    <script src="./command-palette.js"></script>
    <script src="../../shared/preview-runtime.js" data-theme-root="../../../themes"></script>
    <script>
      /* ---- SVG icon helpers ---- */
      var icons = {
        dashboard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
        settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>',
        user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
        plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
        rocket: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 00-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 012-3.95A12.88 12.88 0 0122 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 01-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>',
        download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
        moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>'
      };

      /* ---- Register demo commands ---- */
      CommandPalette.register([
        { id: "nav-dashboard",  label: "Dashboard",        group: "Navigation", icon: icons.dashboard, hint: "Ctrl+D",     action: function() { log("Navigated to Dashboard"); } },
        { id: "nav-settings",   label: "Settings",         group: "Navigation", icon: icons.settings,  hint: "Ctrl+,",     action: function() { log("Navigated to Settings"); } },
        { id: "nav-profile",    label: "Profile",          group: "Navigation", icon: icons.user,                          action: function() { log("Navigated to Profile"); } },
        { id: "act-new",        label: "New Project",      group: "Actions",    icon: icons.plus,      hint: "Ctrl+N",     action: function() { log("Created New Project"); } },
        { id: "act-deploy",     label: "Deploy",           group: "Actions",    icon: icons.rocket,    hint: "Ctrl+Shift+D", action: function() { log("Deploy triggered"); } },
        { id: "act-export",     label: "Export",           group: "Actions",    icon: icons.download,                      action: function() { log("Export triggered"); } },
        { id: "theme-toggle",   label: "Toggle Dark Mode", group: "Theme",      icon: icons.moon,      hint: "Ctrl+Shift+T", action: function() {
          var html = document.documentElement;
          var next = html.dataset.theme === "dark" ? "light" : "dark";
          if (window.ComponentPreviewRuntime) {
            window.ComponentPreviewRuntime.applyTheme(next);
          } else {
            html.dataset.theme = next;
            document.getElementById("ts").value = next;
          }
          log("Theme set to " + next);
        }}
      ]);

      /* ---- Output log ---- */
      var output = document.getElementById("output");
      function log(msg) {
        output.innerHTML = "<strong>Executed:</strong> " + msg;
      }

      document.addEventListener("cmdpalette:execute", function(e) {
        console.log("cmdpalette:execute", e.detail);
      });

      /* ---- Manual open button ---- */
      document.getElementById("open-btn").addEventListener("click", function() {
        CommandPalette.open();
      });
    </script>
  </body>
</html>
